version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: banking_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1907
      POSTGRES_DB: banking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: banking_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres_data:






