validation:

  mandatory_columns:
    - transaction_id
    - account_number
    - amount
    - transaction_timestamp
  
  allowed_currencies:
    - USD
    - EUR
    - INR
    - GBP

fraud_rules:

  high_amount_threshold: 100000

  rapid_txn_limit: 5

  rapid_txn_window_minutes: 2

  geo_window_minutes: 10


storage:

  processed_path: data/processed

  rejected_path: data/rejected





